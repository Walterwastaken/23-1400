
<!DOCTYPE html>
<html>
<head>
    <title>CSS Example</title>

    <!-- Internal CSS -->
    <style>
        .greenText {
            color: green;
        }

        .pinkText {
            color: pink;
        }
    </style>

    <!-- External CSS Link -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Inline CSS -->
    <h2 style="color: blue;">I want a GLE</h2>
    <h2 style="color: red;">I prefer Ferrari</h2>

    <!-- Internal CSS -->
    <p class="greenText">I dont like you</p>
    <p class="pinkText">I want to go out</p>

    <!-- External CSS -->
    <h3 class="purpleText">We are in class</h3>
    <h3 class="goldText">We are not in class</h3>

</body>
</html>
